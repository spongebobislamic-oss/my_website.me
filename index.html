<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toso Web</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}
header{
padding:20px;
text-align:center;
background:linear-gradient(90deg,#00c3ff,#0066ff);
font-size:28px;
font-weight:bold;
}
nav{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
background:#151515;
}
nav a{
color:white;
text-decoration:none;
padding:10px 15px;
border-radius:10px;
background:#222;
transition:0.3s;
}
nav a:hover{
background:#0066ff;
transform:scale(1.05);
}
.hero{
height:300px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200') center/cover;
}
.hero h1{
font-size:45px;
backdrop-filter:blur(5px);
padding:10px 20px;
border-radius:20px;
background:rgba(0,0,0,0.4);
}
.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#1b1b1b;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.3s;
animation:fade 0.5s ease;
}
.card:hover{
transform:translateY(-5px);
}
.card img{
width:100%;
height:180px;
object-fit:cover;
}
.card-content{
padding:15px;
}
.card h3{
margin-bottom:10px;
}
footer{
text-align:center;
padding:20px;
background:#111;
margin-top:20px;
}
@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<header>
🔥 TOSO WEB 🔥
</header>

<nav>
<a href="#">Home</a>
<a href="admin.html">Panel Upload</a>
</nav>

<section class="hero">
<h1>WELCOME TO MY WEBSITE</h1>
<p>Upload konten sesuka hati 😎</p>
</section>

<div class="container" id="posts"></div>

<footer>
© 2026 Toso Web
</footer>

<script>
const postsContainer = document.getElementById('posts');
const posts = JSON.parse(localStorage.getItem('posts')) || [];

function renderPosts(){
postsContainer.innerHTML='';
posts.reverse().forEach(post=>{
postsContainer.innerHTML += `
<div class="card">
<img src="${post.image}" alt="">
<div class="card-content">
<h3>${post.title}</h3>
<p>${post.desc}</p>
</div>
</div>
`;
});
}

renderPosts();
</script>

</body>
  </html>
