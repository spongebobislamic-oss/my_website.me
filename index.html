<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toso CMS</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

header{
padding:20px;
text-align:center;
background:linear-gradient(90deg,#00c3ff,#0051ff);
font-size:30px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:20px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

a{
color:white;
text-decoration:none;
}

.admin-btn{
position:fixed;
bottom:20px;
right:20px;
background:#0051ff;
padding:15px;
border-radius:50%;
font-size:20px;
}
</style>
</head>
<body>

<header>
🔥 TOSO WEB 🔥
</header>

<div class="container" id="posts"></div>

<a href="admin.html" class="admin-btn">⚙</a>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

const posts = document.getElementById('posts');

data.reverse().forEach(post => {
posts.innerHTML += `
<div class="card">
<img src="${post.image}">
<div class="card-content">
<h2>${post.title}</h2>
<p>${post.desc}</p>
</div>
</div>
`;
});

});
</script>

</body>
</html>
<div class="container" id="posts"></div>

<footer>
© 2026 Toso Web
</footer>

<script>
const postsContainer = document.getElementById('posts');
const posts = JSON.parse(localStorage.getItem('posts')) || [];

function renderPosts(){
postsContainer.innerHTML='';
posts.reverse().forEach(post=>{
postsContainer.innerHTML += `
<div class="card">
<img src="${post.image}" alt="">
<div class="card-content">
<h3>${post.title}</h3>
<p>${post.desc}</p>
</div>
</div>
`;
});
}

renderPosts();
</script>

</body>
  </html>
